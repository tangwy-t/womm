<svg xmlns="http://www.w3.org/2000/svg" width="620" height="380" viewBox="0 0 620 380">
  <defs>
    <style>
      .label { font-family: sans-serif; font-size: 9px; font-weight: bold; fill: #888; }
    </style>
  </defs>

  <!-- Light background -->
  <rect width="620" height="380" fill="#f6f8fa" rx="8"/>

  <!-- Row 1: two wide badges -->
  <text class="label" x="16" y="8">CYBERPUNK / wide</text>
  <g transform="translate(10, 14)">
    <rect width="280" height="90" fill="#0d0221" rx="6"/>
    <rect x="1" y="1" width="278" height="88" fill="none" stroke="#d300c5" stroke-width="1" rx="5"/>
    <g transform="translate(16,14)" color="#ff2a6d"><svg width="40" height="40" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></g>
    <text x="70" y="30" fill="#05d9e8" font-family="monospace" font-size="11" font-weight="bold">午夜编码者</text>
    <text x="70" y="50" fill="#3d1a5e" font-family="monospace" font-size="8">月亮不睡我不睡</text>
    <text x="70" y="72" fill="#ff2a6d" font-family="monospace" font-size="7">RARE</text>
  </g>

  <text class="label" x="306" y="8">PIXEL / wide</text>
  <g transform="translate(300, 14)">
    <rect width="280" height="90" fill="#1a1a2e" rx="6"/>
    <rect x="1" y="1" width="278" height="88" fill="none" stroke="#00ff41" stroke-width="1" rx="5"/>
    <g transform="translate(16,14)" color="#00ff41"><svg width="40" height="40" viewBox="0 0 24 24"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg></g>
    <text x="70" y="30" fill="#00ff41" font-family="monospace" font-size="11" font-weight="bold">Git Force Push勇士</text>
    <text x="70" y="50" fill="#336633" font-family="monospace" font-size="8">--force 是我的日常</text>
    <text x="70" y="72" fill="#00ff41" font-family="monospace" font-size="7">RARE</text>
  </g>

  <!-- Row 2: terminal + small badge -->
  <text class="label" x="16" y="124">GLITCH / terminal</text>
  <g transform="translate(10, 130)">
    <rect width="320" height="60" fill="#111111" rx="4"/>
    <rect x="0" y="0" width="320" height="16" fill="#666666" opacity="0.3" rx="4"/>
    <circle cx="12" cy="8" r="3" fill="#ff5f56"/>
    <circle cx="24" cy="8" r="3" fill="#ffbd2e"/>
    <circle cx="36" cy="8" r="3" fill="#27c93f"/>
    <text x="16" y="36" fill="#ffffff" font-family="monospace" font-size="10"><tspan fill="#888888">$</tspan> womm: badge unlocked</text>
    <text x="16" y="52" fill="#ff3333" font-family="monospace" font-size="10" font-weight="bold">&#x2713; 真·破坏王 — 连续3次搞挂CI</text>
  </g>

  <text class="label" x="346" y="124">PIXEL / badge</text>
  <g transform="translate(340, 134)">
    <rect width="240" height="40" fill="#1a1a2e" rx="4"/>
    <rect x="1" y="1" width="238" height="38" fill="none" stroke="#00ff41" stroke-width="1" rx="3" stroke-dasharray="4,2"/>
    <g transform="translate(8,10)" color="#00ff41"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></g>
    <text x="36" y="17" fill="#00ff41" font-family="monospace" font-size="11" font-weight="bold" dominant-baseline="central">在我机器上能运行</text>
    <text x="36" y="32" fill="#336633" font-family="monospace" font-size="8">态度即正义</text>
  </g>

  <!-- Row 3: stamp centered -->
  <text class="label" x="240" y="216">CLEAN / stamp</text>
  <g transform="translate(230, 222)">
    <rect width="160" height="150" fill="#ffffff" rx="6"/>
    <circle cx="80" cy="70" r="62" fill="none" stroke="#dddddd" stroke-width="3" stroke-dasharray="6,3"/>
    <circle cx="80" cy="70" r="52" fill="none" stroke="#333333" stroke-width="1.5"/>
    <g transform="translate(64,30)" color="#e056a0"><svg width="32" height="32" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.5"/></svg></g>
    <text x="80" y="78" fill="#333333" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">周五不部署</text>
    <text x="80" y="94" fill="#999999" font-family="sans-serif" font-size="8" text-anchor="middle">血的教训换来的铁律</text>
    <text x="80" y="114" fill="#e056a0" font-family="sans-serif" font-size="7" text-anchor="middle">RARE</text>
  </g>
</svg>
