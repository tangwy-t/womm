<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <!-- Background -->
  <rect width="600" height="200" fill="#0d1117" rx="8"/>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">WOMM Achievement Badges · GitHub Style</text>
  
  <!-- Bronze Badge: works-on-my-machine (pixel theme) -->
  <g transform="translate(40, 50)">
    <defs>
      <radialGradient id="bg-glow-works-on-my-machine" cx="50%" cy="50%" r="65%">
        <stop offset="0%" stop-color="#3a2818" stop-opacity="1"/>
        <stop offset="100%" stop-color="#1a1a2e" stop-opacity="1"/>
      </radialGradient>
      <radialGradient id="icon-glow-works-on-my-machine" cx="50%" cy="45%" r="40%">
        <stop offset="0%" stop-color="#e0a070" stop-opacity="0.45"/>
        <stop offset="55%" stop-color="#e0a070" stop-opacity="0.10"/>
        <stop offset="100%" stop-color="#e0a070" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="ring-works-on-my-machine" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#e8b888"/>
        <stop offset="50%" stop-color="#cd7f32"/>
        <stop offset="100%" stop-color="#8b4513"/>
      </linearGradient>
    </defs>
    <rect width="160" height="160" rx="8" fill="url(#bg-glow-works-on-my-machine)"/>
    <circle cx="80" cy="80" r="62" fill="url(#icon-glow-works-on-my-machine)"/>
    <g transform="translate(38,38)" color="#cd7f32">
      <svg width="84" height="84" viewBox="0 0 24 24">
        <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </g>
    <circle cx="80" cy="80" r="68" fill="none" stroke="url(#ring-works-on-my-machine)" stroke-width="5"/>
    <circle cx="80" cy="80" r="65" fill="none" stroke="#e8b888" stroke-width="0.5" opacity="0.6"/>
    <!-- Label -->
    <text x="80" y="180" text-anchor="middle" fill="#cd7f32" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">Bronze</text>
  </g>
  
  <!-- Silver Badge: midnight-coder (cyberpunk theme) -->
  <g transform="translate(220, 50)">
    <defs>
      <radialGradient id="bg-glow-midnight-coder" cx="50%" cy="50%" r="65%">
        <stop offset="0%" stop-color="#1a1a1a" stop-opacity="1"/>
        <stop offset="100%" stop-color="#0d0221" stop-opacity="1"/>
      </radialGradient>
      <radialGradient id="icon-glow-midnight-coder" cx="50%" cy="45%" r="40%">
        <stop offset="0%" stop-color="#e0e0e0" stop-opacity="0.45"/>
        <stop offset="55%" stop-color="#e0e0e0" stop-opacity="0.10"/>
        <stop offset="100%" stop-color="#e0e0e0" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="ring-midnight-coder" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#e0e0e0"/>
        <stop offset="50%" stop-color="#c0c0c0"/>
        <stop offset="100%" stop-color="#808080"/>
      </linearGradient>
    </defs>
    <rect width="160" height="160" rx="8" fill="url(#bg-glow-midnight-coder)"/>
    <circle cx="80" cy="80" r="62" fill="url(#icon-glow-midnight-coder)"/>
    <g transform="translate(38,38)" color="#c0c0c0">
      <svg width="84" height="84" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor" stroke="currentColor" stroke-width="1"/>
      </svg>
    </g>
    <circle cx="80" cy="80" r="68" fill="none" stroke="url(#ring-midnight-coder)" stroke-width="5"/>
    <circle cx="80" cy="80" r="65" fill="none" stroke="#e0e0e0" stroke-width="0.5" opacity="0.6"/>
    <!-- Label -->
    <text x="80" y="180" text-anchor="middle" fill="#c0c0c0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">Silver</text>
  </g>
  
  <!-- Gold Badge: true-destroyer (glitch theme) -->
  <g transform="translate(400, 50)">
    <defs>
      <radialGradient id="bg-glow-true-destroyer" cx="50%" cy="50%" r="65%">
        <stop offset="0%" stop-color="#3a3000" stop-opacity="1"/>
        <stop offset="100%" stop-color="#111111" stop-opacity="1"/>
      </radialGradient>
      <radialGradient id="icon-glow-true-destroyer" cx="50%" cy="45%" r="40%">
        <stop offset="0%" stop-color="#ffed4e" stop-opacity="0.45"/>
        <stop offset="55%" stop-color="#ffed4e" stop-opacity="0.10"/>
        <stop offset="100%" stop-color="#ffed4e" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="ring-true-destroyer" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ffed4e"/>
        <stop offset="50%" stop-color="#ffd700"/>
        <stop offset="100%" stop-color="#b8860b"/>
      </linearGradient>
    </defs>
    <rect width="160" height="160" rx="8" fill="url(#bg-glow-true-destroyer)"/>
    <circle cx="80" cy="80" r="62" fill="url(#icon-glow-true-destroyer)"/>
    <g transform="translate(38,38)" color="#ffd700">
      <svg width="84" height="84" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="7" fill="currentColor"/><rect x="7" y="14" width="10" height="7" fill="currentColor"/><line x1="9" y1="15" x2="9" y2="21" stroke="#0d1117" stroke-width="1"/><line x1="12" y1="15" x2="12" y2="21" stroke="#0d1117" stroke-width="1"/><line x1="15" y1="15" x2="15" y2="21" stroke="#0d1117" stroke-width="1"/><circle cx="9" cy="8" r="2" fill="#0d1117"/><circle cx="15" cy="8" r="2" fill="#0d1117"/><polygon points="10,12 14,12 12,15" fill="#0d1117"/>
      </svg>
    </g>
    <circle cx="80" cy="80" r="68" fill="none" stroke="url(#ring-true-destroyer)" stroke-width="5"/>
    <circle cx="80" cy="80" r="65" fill="none" stroke="#ffed4e" stroke-width="0.5" opacity="0.6"/>
    <!-- Gold specular highlight -->
    <ellipse cx="60" cy="58" rx="18" ry="8" fill="#ffffff" opacity="0.12" transform="rotate(-25 60 58)"/>
    <!-- Label -->
    <text x="80" y="180" text-anchor="middle" fill="#ffd700" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">Gold</text>
  </g>
</svg>
